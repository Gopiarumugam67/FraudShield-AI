
services:

  fraudshield-api:

    build:
      context: .

    container_name: fraudshield-api

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      - PYTHONUNBUFFERED=1

    restart: unless-stopped

  fraudshield-dashboard:

    build:
      context: .

    container_name: fraudshield-dashboard

    command: streamlit run dashboard/main.py --server.address=0.0.0.0 --server.port=8501

    ports:
      - "8501:8501"

    depends_on:
      - fraudshield-api

    volumes:
      - .:/app

    environment:
      - PYTHONUNBUFFERED=1

    restart: unless-stopped